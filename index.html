<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Tracker — Paper.id</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap');

    :root {
      --brand-primary: #4199D5;
      --brand-dark:    #133F5D;
      --brand-darker:  #001F3F;
      --brand-green:   #97CC56;
      --brand-red:     #E35273;
      --text-primary:  #133F5D;
      --text-body:     #374151;
      --text-muted:    #6B7280;
      --text-xs:       #9CA3AF;
      --border:        #E5E7EB;
      --bg-page:       #F3F6F9;
      --bg-white:      #FFFFFF;
      --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px; --radius-full: 9999px;
      --t1-color: #16A34A; --t1-light: #F0FDF4; --t1-mid: #DCFCE7; --t1-border: #86EFAC;
      --t2-color: #D97706; --t2-light: #FFFBEB; --t2-mid: #FEF3C7; --t2-border: #FDE68A;
      --t3-color: #2563EB; --t3-light: #EFF6FF; --t3-mid: #DBEAFE; --t3-border: #93C5FD;
      --p1: #DC2626; --p1-bg: #FEE2E2;
      --p2: #D97706; --p2-bg: #FEF3C7;
      --p3: #2563EB; --p3-bg: #DBEAFE;
      --p4: #6B7280; --p4-bg: #F3F4F6;
      --s-todo: #6B7280; --s-todo-bg: #F9FAFB;
      --s-inprogress: #2563EB; --s-inprogress-bg: #EFF6FF;
      --s-done: #16A34A; --s-done-bg: #F0FDF4;
      --s-skipped: #9CA3AF; --s-skipped-bg: #F3F4F6;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg-page); color: var(--text-body); line-height: 1.5; min-height: 100vh; }

    /* ─── HOME NAV ──────────────────────────────────────────────── */
    .home-nav {
      background: linear-gradient(135deg, #001F3F 0%, #133F5D 55%, #1a5276 100%);
      color: white;
      padding: 28px 48px 24px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
    }
    .home-nav-left {}
    .home-nav-eyebrow {
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
    }
    .home-nav-title {
      font-family: 'Lato', sans-serif;
      font-size: 26px;
      font-weight: 900;
    }
    .home-nav-title span { color: #97CC56; }

    /* ─── PRD GRID ──────────────────────────────────────────────── */
    .prd-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      padding: 32px 48px 80px;
      max-width: 1264px;
      margin: 0 auto;
    }

    /* ─── PRD CARD ──────────────────────────────────────────────── */
    .prd-card {
      background: white;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
      overflow: hidden;
    }
    .prd-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.1); transform: translateY(-2px); border-color: var(--brand-primary); }
    .prd-card-stripe { height: 5px; }
    .prd-card-body { padding: 20px 22px 22px; }
    .prd-card-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-xs); margin-bottom: 5px; }
    .prd-card-title { font-family: 'Lato', sans-serif; font-size: 16px; font-weight: 900; color: var(--text-primary); margin-bottom: 5px; }
    .prd-card-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; line-height: 1.5; }
    .prd-card-progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .prd-card-bar-bg { flex: 1; height: 5px; background: #E5E7EB; border-radius: 99px; overflow: hidden; }
    .prd-card-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }
    .prd-card-pct { font-size: 12px; font-weight: 700; min-width: 36px; text-align: right; }
    .prd-card-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .prd-chip { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 99px; border: 1px solid; }
    .prd-chip.todo { color: #6B7280; border-color: #D1D5DB; background: #F9FAFB; }
    .prd-chip.inprogress { color: #2563EB; border-color: #BFDBFE; background: #EFF6FF; }
    .prd-chip.done { color: #16A34A; border-color: #BBF7D0; background: #F0FDF4; }
    .prd-card-open {
      margin-top: 16px;
      width: 100%;
      padding: 9px;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      letter-spacing: 0.3px;
    }

    /* ─── BREADCRUMB ─────────────────────────────────────────────── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 48px;
      background: white;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }
    .breadcrumb-back {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--brand-primary);
      cursor: pointer;
      font-weight: 600;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 0;
    }
    .breadcrumb-back:hover { text-decoration: underline; }
    .breadcrumb-sep { color: #D1D5DB; }
    .breadcrumb-current { color: var(--text-primary); font-weight: 600; }

    /* ─── COVER ─────────────────────────────────────────────────── */
    .cover { background: linear-gradient(135deg, #001F3F 0%, #133F5D 55%, #1a5276 100%); color: white; padding: 40px 48px 32px; }
    .cover-eyebrow { font-family: 'Lato', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 10px; }
    .cover-title { font-family: 'Lato', sans-serif; font-size: 28px; font-weight: 900; line-height: 1.2; margin-bottom: 8px; }
    .cover-title span { color: #97CC56; }
    .cover-sub { font-size: 13px; color: rgba(255,255,255,0.55); max-width: 680px; margin-bottom: 28px; }
    .cover-meta { display: flex; gap: 28px; flex-wrap: wrap; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
    .meta-item { font-size: 12px; color: rgba(255,255,255,0.45); }
    .meta-item strong { display: block; font-family: 'Lato', sans-serif; font-weight: 700; font-size: 13px; color: rgba(255,255,255,0.85); margin-bottom: 2px; }

    /* ─── KEY STATS ─────────────────────────────────────────────── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; background: #0B2835; border-top: 1px solid rgba(255,255,255,0.08); }
    .stat-item { padding: 20px 28px; border-right: 1px solid rgba(255,255,255,0.08); }
    .stat-item:last-child { border-right: none; }
    .stat-num { font-family: 'Lato', sans-serif; font-size: 28px; font-weight: 900; line-height: 1; margin-bottom: 4px; }
    .stat-num.red    { color: #FCA5A5; }
    .stat-num.yellow { color: #FDE68A; }
    .stat-num.green  { color: #A7F3D0; }
    .stat-num.blue   { color: #BAE6FD; }
    .stat-label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.75); margin-top: 5px; }
    .stat-context { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 3px; font-style: italic; }

    /* ─── CONTAINER ─────────────────────────────────────────────── */
    .container { max-width: 1200px; margin: 0 auto; padding: 36px 32px 80px; }

    /* ─── TOOLBAR ───────────────────────────────────────────────── */
    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
    .toolbar-label { font-family: 'Lato', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
    .filter-btn { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: var(--radius-full); border: 1.5px solid var(--border); background: white; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--brand-primary); color: var(--brand-primary); background: #EFF6FF; }
    .filter-btn.active { font-weight: 700; }
    .toolbar-sep { width: 1px; height: 20px; background: var(--border); }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .progress-summary { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text-muted); }
    .progress-summary strong { color: var(--text-primary); }

    /* ─── PROBLEM FRAMING ───────────────────────────────────────── */
    .framing-box { background: white; border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 28px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; }
    .framing-problem { padding: 0 24px; border-right: 1px solid var(--border); }
    .framing-problem:first-child { padding-left: 0; }
    .framing-problem:last-child  { padding-right: 0; border-right: none; }
    .framing-problem .fp-num { font-family: 'Lato', sans-serif; font-size: 22px; font-weight: 900; margin-bottom: 4px; }
    .fp-num.red    { color: var(--p1); }
    .fp-num.yellow { color: var(--p2); }
    .fp-num.blue   { color: var(--p3); }
    .framing-problem h4 { font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
    .framing-problem p  { font-size: 12px; color: var(--text-muted); }

    /* ─── TRACK ─────────────────────────────────────────────────── */
    .track-section { margin-bottom: 44px; }
    .track-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 2px solid var(--border); }
    .track-badge { font-family: 'Lato', sans-serif; font-size: 11px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; padding: 6px 14px; border-radius: var(--radius-full); white-space: nowrap; flex-shrink: 0; }
    .track-badge.t1 { background: var(--t1-light); color: var(--t1-color); border: 1.5px solid var(--t1-border); }
    .track-badge.t2 { background: var(--t2-light); color: var(--t2-color); border: 1.5px solid var(--t2-border); }
    .track-badge.t3 { background: var(--t3-light); color: var(--t3-color); border: 1.5px solid var(--t3-border); }
    .track-title { font-family: 'Lato', sans-serif; font-size: 17px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; }
    .track-desc  { font-size: 13px; color: var(--text-muted); }
    .track-timeline { margin-left: auto; font-family: 'Lato', sans-serif; font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: var(--radius-full); white-space: nowrap; flex-shrink: 0; }
    .track-timeline.t1 { background: var(--t1-mid); color: var(--t1-color); }
    .track-timeline.t2 { background: var(--t2-mid); color: var(--t2-color); }
    .track-timeline.t3 { background: var(--t3-mid); color: var(--t3-color); }

    /* ─── TASK CARD ─────────────────────────────────────────────── */
    .task-grid { display: flex; flex-direction: column; gap: 10px; }
    .task-card { background: white; border: 1.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: box-shadow 0.15s; position: relative; }
    .task-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
    .task-card.done { opacity: 0.6; }
    .task-card.done .task-title { text-decoration: line-through; color: var(--text-muted); }
    .task-card.skipped { opacity: 0.4; }
    .task-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
    .task-card.t1::before { background: var(--t1-color); }
    .task-card.t2::before { background: var(--t2-color); }
    .task-card.t3::before { background: var(--t3-color); }
    .task-card-inner { padding: 14px 18px 14px 22px; display: flex; align-items: flex-start; gap: 14px; }
    .priority-badge { font-family: 'Lato', sans-serif; font-size: 11px; font-weight: 900; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .priority-badge.p1 { background: var(--p1-bg); color: var(--p1); }
    .priority-badge.p2 { background: var(--p2-bg); color: var(--p2); }
    .priority-badge.p3 { background: var(--p3-bg); color: var(--p3); }
    .priority-badge.p4 { background: var(--p4-bg); color: var(--p4); }
    .task-body { flex: 1; min-width: 0; }
    .task-top  { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
    .task-title { font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; color: var(--text-primary); flex: 1; line-height: 1.35; }
    .task-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .chip { display: inline-flex; align-items: center; gap: 4px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: var(--radius-full); }
    .chip.impact-vh { background: #FEE2E2; color: #991B1B; }
    .chip.impact-h  { background: #FFEDD5; color: #9A3412; }
    .chip.impact-m  { background: var(--p2-bg); color: #92400E; }
    .chip.effort-lo { background: #F0FDF4; color: #166534; }
    .chip.effort-md { background: #FFFBEB; color: #92400E; }
    .chip.effort-hi { background: #FEF2F2; color: #991B1B; }
    .chip.screen    { background: #EFF6FF; color: #1E40AF; }
    .chip.compliance-none { background: #F0FDF4; color: #166534; }
    .chip.compliance-low  { background: #FFFBEB; color: #92400E; }
    .evidence-block { background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 8px; }
    .evidence-label { font-family: 'Lato', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-xs); margin-bottom: 5px; }
    .evidence-items { display: flex; flex-direction: column; gap: 4px; }
    .evidence-item { font-size: 12px; color: var(--text-body); display: flex; align-items: flex-start; gap: 8px; }
    .ev-stat { font-family: 'Lato', sans-serif; font-weight: 700; color: var(--brand-dark); white-space: nowrap; flex-shrink: 0; }
    .ev-stat.red    { color: #DC2626; }
    .ev-stat.yellow { color: #D97706; }
    .ev-stat.green  { color: #16A34A; }
    .ev-desc { color: var(--text-muted); font-size: 11.5px; }
    .deliverables { display: flex; flex-direction: column; gap: 3px; }
    .deliverable-label { font-family: 'Lato', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-xs); margin-bottom: 4px; }
    .deliverable-item { font-size: 11.5px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .deliverable-item::before { content: '→'; font-size: 10px; color: var(--text-xs); flex-shrink: 0; }

    /* ─── FIGMA LINK ────────────────────────────────────────────── */
    .figma-link-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
    .figma-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.5; }
    .figma-link-badge { display: inline-flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif; font-size: 11.5px; font-weight: 600; color: #7C3AED; background: #F5F3FF; border: 1.5px solid #DDD6FE; border-radius: var(--radius-full); padding: 4px 12px; text-decoration: none; transition: all 0.15s; max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .figma-link-badge:hover { background: #EDE9FE; border-color: #A78BFA; color: #5B21B6; }
    .figma-add-btn { font-family: 'DM Sans', sans-serif; font-size: 11.5px; font-weight: 600; color: var(--text-xs); background: none; border: 1.5px dashed #D1D5DB; border-radius: var(--radius-full); padding: 4px 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .figma-add-btn:hover { border-color: #A78BFA; color: #7C3AED; background: #F5F3FF; }
    .figma-edit-btn { font-size: 11px; color: var(--text-xs); background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: var(--radius-sm); flex-shrink: 0; transition: color 0.15s; }
    .figma-edit-btn:hover { color: #7C3AED; }
    .figma-input-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
    .figma-input { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 10px; border: 1.5px solid #A78BFA; border-radius: var(--radius-full); outline: none; color: var(--text-body); background: #FAFAFA; min-width: 0; }
    .figma-input:focus { border-color: #7C3AED; background: white; }
    .figma-save-btn { font-family: 'Lato', sans-serif; font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: var(--radius-full); border: none; background: #7C3AED; color: white; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
    .figma-save-btn:hover { background: #5B21B6; }
    .figma-cancel-btn { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--text-xs); background: none; border: none; cursor: pointer; padding: 4px; flex-shrink: 0; }

    /* ─── STATUS BUTTON ─────────────────────────────────────────── */
    .task-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; flex-shrink: 0; }
    .status-btn { font-family: 'Lato', sans-serif; font-size: 11px; font-weight: 700; padding: 6px 14px; border-radius: var(--radius-full); border: 1.5px solid; cursor: pointer; white-space: nowrap; transition: all 0.15s; letter-spacing: 0.3px; }
    .status-btn.todo       { background: var(--s-todo-bg);       color: var(--s-todo);       border-color: #D1D5DB; }
    .status-btn.inprogress { background: var(--s-inprogress-bg); color: var(--s-inprogress); border-color: #93C5FD; }
    .status-btn.done       { background: var(--s-done-bg);       color: var(--s-done);       border-color: #86EFAC; }
    .status-btn.skipped    { background: var(--s-skipped-bg);    color: var(--s-skipped);    border-color: #D1D5DB; }
    .status-btn:hover { transform: scale(1.03); }
    .wip-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; font-family: 'Lato', sans-serif; color: var(--brand-green); padding: 3px 8px; border-radius: var(--radius-full); border: 1px solid #86EFAC; background: #F0FDF4; white-space: nowrap; }
    .wip-tag.inprogress { color: var(--brand-primary); border-color: #93C5FD; background: #EFF6FF; }

    /* ─── FOOTER PROGRESS ───────────────────────────────────────── */
    .footer-progress { background: white; border: 1.5px solid var(--border); border-radius: var(--radius-xl); padding: 22px 26px; margin-top: 14px; }
    .fp-title { font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 14px; }
    .fp-grid { display: grid; gap: 18px; }
    .fp-track { display: flex; flex-direction: column; gap: 5px; }
    .fp-track-name { font-family: 'Lato', sans-serif; font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 2px; }
    .fp-bar-row { display: flex; align-items: center; gap: 10px; }
    .fp-bar-bg { flex: 1; height: 8px; background: var(--border); border-radius: var(--radius-full); overflow: hidden; }
    .fp-bar-fill { height: 100%; border-radius: var(--radius-full); transition: width 0.5s ease; }
    .fp-bar-fill.t1 { background: var(--t1-color); }
    .fp-bar-fill.t2 { background: var(--t2-color); }
    .fp-bar-fill.t3 { background: var(--t3-color); }
    .fp-bar-fill.overall { background: var(--brand-primary); }
    .fp-pct { font-family: 'Lato', sans-serif; font-size: 12px; font-weight: 700; width: 36px; text-align: right; }
    .fp-pct.t1 { color: var(--t1-color); }
    .fp-pct.t2 { color: var(--t2-color); }
    .fp-pct.t3 { color: var(--t3-color); }
    .fp-pct.overall { color: var(--brand-primary); }
    .fp-count { font-size: 11px; color: var(--text-xs); }

    /* ─── SYNC ──────────────────────────────────────────────────── */
    .sync-pill { display: inline-flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif; font-size: 11.5px; font-weight: 600; padding: 5px 12px; border-radius: var(--radius-full); border: 1.5px solid var(--border); background: white; color: var(--text-muted); white-space: nowrap; transition: all 0.2s; }
    .sync-pill .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-xs); flex-shrink: 0; transition: background 0.2s; }
    .sync-pill.synced   { color: #16A34A; border-color: #86EFAC; }
    .sync-pill.synced   .sync-dot { background: #16A34A; }
    .sync-pill.saving   { color: #D97706; border-color: #FDE68A; }
    .sync-pill.saving   .sync-dot { background: #D97706; animation: pulse 0.8s infinite; }

const state = {};   // { [prdId]: { status:{}, figmaLinks:{} } }

function ensureState(prdId) {
  if (!state[prdId]) state[prdId] = { status:{}, figmaLinks:{} };
}

// ─── SYNC PILL ───────────────────────────────────────────────────────
function setSyncStatus(mode, text) {
  const pill  = document.getElementById('sync-pill');
  const label = document.getElementById('sync-label');
  if (!pill || !label) return;
  pill.className = 'sync-pill ' + mode + (currentPrd ? '' : ' dark-bg');
  label.textContent = text;
}

// ─── FIREBASE ────────────────────────────────────────────────────────
async function pushState() {
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  if (!FIREBASE_URL) { setSyncStatus('local', 'Saved locally'); return; }
  setSyncStatus('saving', 'Saving…');
  try {
    const res = await fetch(FIREBASE_URL + '/tracker.json', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });
    if (!res.ok) throw new Error(res.status);
    setSyncStatus('synced', 'Synced ✓');
  } catch(e) {
    setSyncStatus('error', 'Sync error — check connection');
  }
}

async function loadState() {
  if (!FIREBASE_URL) {
    const cached = localStorage.getItem(LS_KEY);
    if (cached) { try { const d = JSON.parse(cached); Object.keys(d).forEach(k => { state[k] = d[k]; }); } catch(_) {} }
    setSyncStatus('local', 'Local only');
    return;
  }
  setSyncStatus('loading', 'Loading…');
  try {
    const res  = await fetch(FIREBASE_URL + '/tracker.json?t=' + Date.now());
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    if (data && typeof data === 'object') {
      // Detect old flat format (pre-multi-PRD) and migrate
      if (data.status && !data['kyc-revamp']) {
        state['kyc-revamp'] = { status: data.status || {}, figmaLinks: data.figmaLinks || {} };
      } else {
        Object.keys(data).forEach(prdId => {
          if (!state[prdId]) state[prdId] = { status:{}, figmaLinks:{} };
          if (data[prdId] && data[prdId].status)     Object.assign(state[prdId].status,     data[prdId].status);
          if (data[prdId] && data[prdId].figmaLinks) Object.assign(state[prdId].figmaLinks, data[prdId].figmaLinks);
        });
      }
    }
    setSyncStatus('synced', 'Synced ✓');
  } catch(e) {
    const cached = localStorage.getItem(LS_KEY);
    if (cached) { try { const d = JSON.parse(cached); Object.keys(d).forEach(k => { state[k] = d[k]; }); } catch(_) {} }
    setSyncStatus('error', 'Could not connect — using local cache');
  }
}

function schedulePush() {
  clearTimeout(syncTimer);
  setSyncStatus('saving', 'Saving…');
  syncTimer = setTimeout(pushState, 700);
}

// ─── ROUTING ─────────────────────────────────────────────────────────
function goHome() { currentPrd = null; render(); }
function goPrd(id) { currentPrd = id; render(); }

function render() {
  if (currentPrd) renderPrd(currentPrd);
  else            renderHome();
}

// ─── HOME VIEW ───────────────────────────────────────────────────────
function getPrdProgress(prd) {
  ensureState(prd.id);
  const s = state[prd.id].status;
  let done = 0, inprogress = 0;
  prd.tasks.forEach(t => {
    const st = s['card-' + t.id] || t.initialStatus || 'todo';
    if (st === 'done')        done++;
    else if (st === 'inprogress') inprogress++;
  });
  const todo  = prd.tasks.length - done - inprogress;
  const pct   = prd.tasks.length ? Math.round(done / prd.tasks.length * 100) : 0;
  return { done, inprogress, todo, pct, total: prd.tasks.length };
}

function renderHome() {
  const cards = Object.values(PRDS).map(prd => {
    const p = getPrdProgress(prd);
    const chipsHTML = [
      p.done       ? `<span class="prd-chip done">${p.done} Done</span>` : '',
      p.inprogress ? `<span class="prd-chip inprogress">${p.inprogress} In Progress</span>` : '',
      p.todo       ? `<span class="prd-chip todo">${p.todo} To Do</span>` : ''
    ].join('');
    return `
      <div class="prd-card" onclick="goPrd('${prd.id}')">
        <div class="prd-card-stripe" style="background:${prd.color}"></div>
        <div class="prd-card-body">
          <div class="prd-card-eyebrow">${prd.eyebrow}</div>
          <div class="prd-card-title">${prd.title}</div>
          <div class="prd-card-desc">${prd.description}</div>
          <div class="prd-card-progress-row">
            <div class="prd-card-bar-bg"><div class="prd-card-bar-fill" style="width:${p.pct}%;background:${prd.color}"></div></div>
            <div class="prd-card-pct" style="color:${prd.color}">${p.pct}%</div>
          </div>
          <div class="prd-card-chips">${chipsHTML}</div>
          <button class="prd-card-open" style="background:${prd.color}">Open tracker →</button>
        </div>
      </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="home-nav">
      <div class="home-nav-left">
        <div class="home-nav-eyebrow">Paper.id · Product Design</div>
        <div class="home-nav-title">Design <span>Tracker</span></div>
      </div>
      <div class="sync-pill dark-bg" id="sync-pill"><span class="sync-dot"></span><span id="sync-label">…</span></div>
    </div>
    <div class="prd-grid">${cards}</div>`;

  setSyncStatus(FIREBASE_URL ? 'synced' : 'local', FIREBASE_URL ? 'Synced ✓' : 'Local only');
}

// ─── PRD VIEW ────────────────────────────────────────────────────────
function renderPrd(prdId) {
  const prd = PRDS[prdId];
  if (!prd) { goHome(); return; }
  ensureState(prdId);

  const statsHTML = prd.stats
    ? prd.stats.map(s => `
        <div class="stat-item">
          <div class="stat-num ${s.cls}">${s.num}</div>
          <div class="stat-label">${s.label}</div>
          <div class="stat-context">${s.context}</div>
        </div>`).join('')
    : '';

  const framingHTML = prd.framing
    ? prd.framing.map(f => `
        <div class="framing-problem">
          <div class="fp-num ${f.cls}">${f.num}</div>
          <h4>${f.title}</h4>
          <p>${f.body}</p>
        </div>`).join('')
    : '';

  document.getElementById('app').innerHTML = `
    <div class="breadcrumb">
      <button class="breadcrumb-back" onclick="goHome()">← All Projects</button>
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-current">${prd.title}</span>
    </div>
    <div class="cover">
      <div class="cover-eyebrow">Paper.id · Product Design · ${prd.eyebrow}</div>
      <h1 class="cover-title">${prd.title}<br><span>Design Workboard</span></h1>
      <p class="cover-sub">All tasks mapped to evidence from the research report. Click status badges to update progress.</p>
      <div class="cover-meta">
        <div class="meta-item"><strong>Design owner</strong>${prd.owner}</div>
        <div class="meta-item"><strong>Last updated</strong>${prd.updated}</div>
      </div>
    </div>
    ${statsHTML ? `<div class="stats-row">${statsHTML}</div>` : ''}
    <div class="container">
      ${framingHTML ? `<div class="framing-box">${framingHTML}</div>` : ''}
      <div class="toolbar">
        <span class="toolbar-label">Filter</span>
        <button class="filter-btn active" onclick="filterCards('all',this)">All tasks</button>
        <button class="filter-btn" onclick="filterCards('p1',this)">P1 Critical</button>
        <button class="filter-btn" onclick="filterCards('p2',this)">P2 High</button>
        <button class="filter-btn" onclick="filterCards('p3',this)">P3 Medium</button>
        <div class="toolbar-sep"></div>
        <button class="filter-btn" onclick="filterCards('todo',this)">To Do</button>
        <button class="filter-btn" onclick="filterCards('inprogress',this)">In Progress</button>
        <button class="filter-btn" onclick="filterCards('done',this)">Done</button>
        <div class="toolbar-right">
          <div class="progress-summary" id="progress-summary">Loading…</div>
          <div class="sync-pill local" id="sync-pill"><span class="sync-dot"></span><span id="sync-label">Loading…</span></div>
        </div>
      </div>
      ${tracksHTML(prd)}
      ${footerProgressHTML(prd)}
    </div>`;

  initFigmaLinks();
  applyStateToDom(prdId);
  updateProgress(prdId);
  setSyncStatus(FIREBASE_URL ? 'synced' : 'local', FIREBASE_URL ? 'Synced ✓' : 'Local only');
}

function taskHTML(task, prd) {
  const cardId = 'card-' + task.id;
  ensureState(prd.id);
  const status  = state[prd.id].status[cardId] || task.initialStatus || 'todo';
  const tCls    = 't' + task.track;
  const doneCls = status === 'done' ? ' done' : status === 'skipped' ? ' skipped' : '';
  const wipHTML = task.wipTag
    ? `<span class="wip-tag ${task.wipTag.cls}">${task.wipTag.text}</span>` : '';
  const chipsHTML = task.chips.map(c =>
    `<span class="chip ${c.cls}">${c.text}</span>`).join('');
  const evHTML = task.evidence.map(e =>
    `<div class="evidence-item"><span class="ev-stat ${e.cls}">${e.stat}</span><span class="ev-desc">${e.desc}</span></div>`).join('');
  const delHTML = task.deliverables.map(d =>
    `<div class="deliverable-item">${d}</div>`).join('');
  return `
    <div class="task-card ${tCls}${doneCls}" data-priority="${task.priority}" data-status="${status}" id="${cardId}">
      <div class="task-card-inner">
        <div class="priority-badge ${task.priority}">${task.priority.toUpperCase()}</div>
        <div class="task-body">
          <div class="task-top">
            <div class="task-title">${task.title}</div>
            ${wipHTML}
          </div>
          <div class="task-chips">${chipsHTML}</div>
          <div class="evidence-block">
            <div class="evidence-label">Evidence from Report</div>
            <div class="evidence-items">${evHTML}</div>
          </div>
          <div class="deliverable-label">Design Deliverables</div>
          <div class="deliverables">${delHTML}</div>
          <div class="figma-link-row" id="figma-row-${cardId}"></div>
        </div>
        <div class="task-right">
          <button class="status-btn ${status}" onclick="cycleStatus('${cardId}',this)">${STATUS_LABELS[status]}</button>
        </div>
      </div>
    </div>`;
}

function tracksHTML(prd) {
  if (!prd.hasTracks) {
    return `<div class="track-section"><div class="task-grid">${prd.tasks.map(t => taskHTML(t, prd)).join('')}</div></div>`;
  }
  return prd.tracks.map(track => {
    const trackTasks = prd.tasks.filter(t => t.track === track.num);
    return `
      <div class="track-section" data-track="${track.num}">
        <div class="track-header">
          <div class="track-badge ${track.cls}">Track ${track.num}</div>
          <div class="track-header-text">
            <div class="track-title">${track.title}</div>
            <div class="track-desc">${track.desc}</div>
          </div>
          <div class="track-timeline ${track.cls}">${track.timeline}</div>
        </div>
        <div class="task-grid">${trackTasks.map(t => taskHTML(t, prd)).join('')}</div>
      </div>`;
  }).join('');
}

function footerProgressHTML(prd) {
  if (!prd.hasTracks) {
    return `
      <div class="footer-progress">
        <div class="fp-title">Overall Progress</div>
        <div class="fp-grid" style="grid-template-columns:1fr">
          <div class="fp-track">
            <div class="fp-track-name">All tasks (${prd.tasks.length} total)</div>
            <div class="fp-bar-row">
              <div class="fp-bar-bg"><div class="fp-bar-fill overall" id="bar-overall" style="width:0%"></div></div>
              <div class="fp-pct overall" id="pct-overall">0%</div>
            </div>
            <div class="fp-count" id="count-overall">0 of ${prd.tasks.length} done</div>
          </div>
        </div>
      </div>`;
  }
  const trackBars = prd.tracks.map(track => {
    const n = prd.tasks.filter(t => t.track === track.num).length;
    return `
      <div class="fp-track">
        <div class="fp-track-name">Track ${track.num} — ${track.title.replace(/&amp;/g,'&')} (${n} tasks)</div>
        <div class="fp-bar-row">
          <div class="fp-bar-bg"><div class="fp-bar-fill ${track.cls}" id="bar-t${track.num}" style="width:0%"></div></div>
          <div class="fp-pct ${track.cls}" id="pct-t${track.num}">0%</div>
        </div>
        <div class="fp-count" id="count-t${track.num}">0 of ${n} done</div>
      </div>`;
  }).join('');
  return `
    <div class="footer-progress">
      <div class="fp-title">Overall Progress</div>
      <div class="fp-grid" style="grid-template-columns:repeat(${prd.tracks.length},1fr)">${trackBars}</div>
    </div>`;
}

// ─── STATUS ──────────────────────────────────────────────────────────
function cycleStatus(cardId, btn) {
  const card    = document.getElementById(cardId);
  if (!card) return;
  const current = card.dataset.status;
  const next    = STATUS_CYCLE[(STATUS_CYCLE.indexOf(current) + 1) % STATUS_CYCLE.length];
  card.dataset.status = next;
  card.className = card.className.replace(/\b(done|skipped)\b/g,'').trim();
  if (next === 'done')    card.classList.add('done');
  if (next === 'skipped') card.classList.add('skipped');
  btn.className   = 'status-btn ' + next;
  btn.textContent = STATUS_LABELS[next];
  ensureState(currentPrd);
  state[currentPrd].status[cardId] = next;
  schedulePush();
  updateProgress(currentPrd);
  applyFilter(document.querySelector('.filter-btn.active')?.getAttribute('data-filter') || 'all');
}

// ─── FIGMA LINK ──────────────────────────────────────────────────────
const FIGMA_SVG = `<svg class="figma-icon" viewBox="0 0 38 57" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M19 28.5A9.5 9.5 0 1 1 28.5 19 9.5 9.5 0 0 1 19 28.5z" fill="#1ABCFE"/><path d="M0 47.5A9.5 9.5 0 0 1 9.5 38H19v9.5A9.5 9.5 0 1 1 0 47.5z" fill="#0ACF83"/><path d="M19 0v19h9.5A9.5 9.5 0 1 0 19 0z" fill="#FF7262"/><path d="M0 9.5A9.5 9.5 0 0 0 9.5 19H19V0H9.5A9.5 9.5 0 0 0 0 9.5z" fill="#F24E1E"/><path d="M0 28.5A9.5 9.5 0 0 0 9.5 38H19V19H9.5A9.5 9.5 0 0 0 0 28.5z" fill="#A259FF"/></svg>`;

function getFigmaLabel(url) {
  try {
    const u = new URL(url);
    const parts = u.pathname.split('/');
    const idx = parts.findIndex(p => p === 'design' || p === 'file') + 2;
    if (idx > 1 && parts[idx]) return decodeURIComponent(parts[idx]).replace(/-/g,' ');
  } catch(e) {}
  return 'Open in Figma';
}

function renderFigmaLink(cardId) {
  const row = document.getElementById('figma-row-' + cardId);
  if (!row) return;
  ensureState(currentPrd);
  const url = state[currentPrd].figmaLinks[cardId] || '';
  if (url) {
    row.innerHTML = FIGMA_SVG +
      `<a class="figma-link-badge" href="${url}" target="_blank" rel="noopener">↗ ${getFigmaLabel(url)}</a>
       <button class="figma-edit-btn" onclick="editFigmaLink('${cardId}')">✎ Edit</button>`;
  } else {
    row.innerHTML = FIGMA_SVG +
      `<button class="figma-add-btn" onclick="editFigmaLink('${cardId}')">+ Add Figma link</button>`;
  }
}

function editFigmaLink(cardId) {
  const row = document.getElementById('figma-row-' + cardId);
  ensureState(currentPrd);
  const current = state[currentPrd].figmaLinks[cardId] || '';
  row.innerHTML = FIGMA_SVG +
    `<div class="figma-input-wrap">
      <input class="figma-input" id="figma-input-${cardId}" type="url" placeholder="Paste Figma link…" value="${current}" />
      <button class="figma-save-btn" onclick="saveFigmaLink('${cardId}')">Save</button>
      <button class="figma-cancel-btn" onclick="renderFigmaLink('${cardId}')">✕</button>
    </div>`;
  const input = document.getElementById('figma-input-' + cardId);
  if (input) {
    input.focus();
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  saveFigmaLink(cardId);
      if (e.key === 'Escape') renderFigmaLink(cardId);
    });
  }
}

function saveFigmaLink(cardId) {
  const input = document.getElementById('figma-input-' + cardId);
  const val   = (input ? input.value : '').trim();
  ensureState(currentPrd);
  if (val) state[currentPrd].figmaLinks[cardId] = val;
  else     delete state[currentPrd].figmaLinks[cardId];
  schedulePush();
  renderFigmaLink(cardId);
}

function initFigmaLinks() {
  document.querySelectorAll('.task-card[id]').forEach(card => {
    renderFigmaLink(card.id);
  });
}

// ─── FILTER ──────────────────────────────────────────────────────────
function filterCards(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('active'); b.removeAttribute('data-filter'); });
  btn.classList.add('active');
  btn.setAttribute('data-filter', filter);
  applyFilter(filter);
}

function applyFilter(filter) {
  document.querySelectorAll('.task-card').forEach(card => {
    const p = card.dataset.priority;
    const s = card.dataset.status;
    let show = true;
    if      (filter === 'p1')         show = p === 'p1';
    else if (filter === 'p2')         show = p === 'p2';
    else if (filter === 'p3')         show = p === 'p3';
    else if (filter === 'p4')         show = p === 'p4';
    else if (filter === 'todo')       show = s === 'todo';
    else if (filter === 'inprogress') show = s === 'inprogress';
    else if (filter === 'done')       show = s === 'done';
    card.style.display = show ? '' : 'none';
  });
}

// ─── PROGRESS ────────────────────────────────────────────────────────
function updateProgress(prdId) {
  const prd = PRDS[prdId];
  if (!prd) return;

  let totalDone = 0;
  if (prd.hasTracks) {
    prd.tracks.forEach(track => {
      const trackTasks = prd.tasks.filter(t => t.track === track.num);
      let done = 0;
      trackTasks.forEach(t => {
        const card = document.getElementById('card-' + t.id);
        if (card && card.dataset.status === 'done') done++;
      });
      totalDone += done;
      const pct = trackTasks.length ? Math.round(done / trackTasks.length * 100) : 0;
      const barEl   = document.getElementById('bar-t' + track.num);
      const pctEl   = document.getElementById('pct-t' + track.num);
      const countEl = document.getElementById('count-t' + track.num);
      if (barEl)   barEl.style.width    = pct + '%';
      if (pctEl)   pctEl.textContent    = pct + '%';
      if (countEl) countEl.textContent  = done + ' of ' + trackTasks.length + ' done';
    });
  } else {
    prd.tasks.forEach(t => {
      const card = document.getElementById('card-' + t.id);
      if (card && card.dataset.status === 'done') totalDone++;
    });
    const pct = prd.tasks.length ? Math.round(totalDone / prd.tasks.length * 100) : 0;
    const b = document.getElementById('bar-overall');
    const p = document.getElementById('pct-overall');
    const c = document.getElementById('count-overall');
    if (b) b.style.width   = pct + '%';
    if (p) p.textContent   = pct + '%';
    if (c) c.textContent   = totalDone + ' of ' + prd.tasks.length + ' done';
  }

  const summaryEl = document.getElementById('progress-summary');
  if (summaryEl) summaryEl.innerHTML = '<strong>' + totalDone + ' / ' + prd.tasks.length + '</strong> tasks complete';
}

// ─── APPLY STATE → DOM ───────────────────────────────────────────────
function applyStateToDom(prdId) {
  ensureState(prdId);
  const s = state[prdId].status;
  document.querySelectorAll('.task-card[id]').forEach(card => {
    const id   = card.id;
    const next = s[id];
    if (!next || next === card.dataset.status) return;
    card.dataset.status = next;
    card.className = card.className.replace(/\b(done|skipped)\b/g,'').trim();
    if (next === 'done')    card.classList.add('done');
    if (next === 'skipped') card.classList.add('skipped');
    const btn = card.querySelector('.status-btn');
    if (btn) { btn.className = 'status-btn ' + next; btn.textContent = STATUS_LABELS[next]; }
  });
  updateProgress(prdId);
}

// ─── INIT ────────────────────────────────────────────────────────────
async function init() {
  await loadState();
  render();
}

init();
</script>
</body>
</html>
